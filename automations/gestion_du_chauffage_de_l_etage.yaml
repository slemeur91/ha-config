id: '1753904612706'
alias: Gestion du Chauffage de l'Etage
description: '**Statut :** Finalisé

  **Evolution :** Aucune


  **Déclencheurs :**

  - Changement de `input_boolean.chauffage_horsgel`, `input_select.chauffage_mode_etage`,
  `input_select.chauffage_action`

  - Fin de `timer.chauffage_timer_etage`

  - Changement de température courante d''un des 5 thermostats Z-Wave de l''étage

  - Changement d''état des velux ou des détecteurs de portes (avec délai 5 min)


  **Fonctionnement :**

  1. Calcule en parallèle la variable `horsgel_etage` (vrai si mode HorsGel global,
  portes/velux ouverts, ou mode Absent) et ajuste les consignes de chaque pièce selon
  le mode (Confort / Réduit / TéléTravail).

  2. Met à jour `input_boolean.chauffage_horsgel_etage` et envoie un mail si changement
  de mode.

  3. Applique la consigne calculée à chacun des 5 thermostats Z-Wave (Bureau, Chambre,
  Suite parentale, SdE, SdB) ; si au moins un thermostat a été mis à jour, démarre
  le timer de vérification.

  4. Calcule avec hystérésis si la chaudière doit chauffer (comparaison température
  courante vs consigne sur les 5 zones) et pilote le switch chaudière en conséquence.


  **Entités principales :**

  - `climate.chauffage_du_bureau/chambre/suite_parentale/salle_d_eau/salle_de_bain_nodeid_*`
  : thermostats Z-Wave

  - `switch.switch_de_la_chaudiere_switch` : commande chaudière

  - `timer.chauffage_timer_etage` : délai de vérification

  - `counter.chauffage_compteur_etage` / `counter.chauffage_compteur_etage_action`
  : logique de décision'
triggers:
- trigger: state
  entity_id:
  - input_boolean.chauffage_horsgel
  id: Chauffage HorsGel
- trigger: state
  entity_id:
  - input_select.chauffage_mode_etage
  id: Chauffage Mode
- trigger: state
  entity_id:
  - input_select.chauffage_action
  id: Chauffage Action
- trigger: event
  event_type: timer.finished
  event_data:
    entity_id: timer.chauffage_timer_etage
- trigger: state
  entity_id:
  - climate.chauffage_du_bureau_nodeid_2_climate
  - climate.chauffage_de_la_chambre_nodeid_6_climate
  - climate.chauffage_de_la_suite_parentale_nodeid_3_climate
  - climate.chauffage_de_la_salle_d_eau_nodeid_4_climate
  - climate.chauffage_de_la_salle_de_bain_nodeid_5_climate
  attribute: current_temperature
- trigger: state
  entity_id:
  - cover.velux_de_la_chambre
  - cover.velux_de_la_salle_de_bain
  - cover.velux_de_la_salle_d_eau
  - binary_sensor.do_suite_parental
  - binary_sensor.do_bureau
  to: null
  for:
    hours: 0
    minutes: 5
    seconds: 0
conditions: []
actions:
- parallel:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.chauffage_horsgel
        state: 'on'
      sequence:
      - variables:
          horsgel_etage: true
    - conditions:
      - condition: state
        entity_id: input_boolean.chauffage_horsgel
        state: 'off'
      sequence:
      - if:
        - condition: or
          conditions:
          - condition: state
            entity_id: binary_sensor.do_bureau
            state: 'on'
          - condition: state
            entity_id: binary_sensor.do_suite_parental
            state: 'on'
          - condition: state
            entity_id: cover.velux_de_la_chambre
            state: open
          - condition: state
            entity_id: cover.velux_de_la_salle_de_bain
            state: open
          - condition: state
            entity_id: cover.velux_de_la_salle_d_eau
            state: open
        then:
        - variables:
            horsgel_etage: true
        else:
        - choose:
          - conditions:
            - condition: state
              entity_id: input_select.chauffage_action
              state: Repos
            sequence:
            - variables:
                horsgel_etage: false
          - conditions:
            - condition: state
              entity_id: input_select.chauffage_action
              state: TéléTravail
            sequence:
            - variables:
                horsgel_etage: false
          - conditions:
            - condition: state
              entity_id: input_select.chauffage_action
              state: Travail
            sequence:
            - variables:
                horsgel_etage: false
          - conditions:
            - condition: state
              entity_id: input_select.chauffage_action
              state: Absent
            sequence:
            - variables:
                horsgel_etage: true
  - choose:
    - conditions:
      - condition: state
        entity_id: input_select.chauffage_mode_etage
        state: Confort
      sequence:
      - action: input_number.set_value
        metadata: {}
        data:
          value: '{{ states(''input_number.chauffage_consigne_confort_chambre_etage'')
            }}'
        target:
          entity_id:
          - input_number.chauffage_chambre
          - input_number.chauffage_suiteparentale
      - if:
        - condition: state
          entity_id: input_select.chauffage_action
          state: TéléTravail
        then:
        - action: input_number.set_value
          metadata: {}
          data:
            value: '{{ states(''input_number.chauffage_consigne_confort_etage'') }}'
          target:
            entity_id:
            - input_number.chauffage_bureau
        else:
        - action: input_number.set_value
          metadata: {}
          data:
            value: '{{ states(''input_number.chauffage_consigne_confort_chambre_etage'')
              }}'
          target:
            entity_id:
            - input_number.chauffage_bureau
      - action: input_number.set_value
        metadata: {}
        data:
          value: '{{ states(''input_number.chauffage_consigne_sdb_etage'') }}'
        target:
          entity_id:
          - input_number.chauffage_sdb
          - input_number.chauffage_sde
    - conditions:
      - condition: state
        entity_id: input_select.chauffage_mode_etage
        state: Réduit
      sequence:
      - action: input_number.set_value
        metadata: {}
        data:
          value: '{{ states(''input_number.chauffage_consigne_reduit_chambre_etage'')
            }}'
        target:
          entity_id:
          - input_number.chauffage_chambre
          - input_number.chauffage_suiteparentale
      - if:
        - condition: and
          conditions:
          - condition: state
            entity_id: input_select.chauffage_action
            state: TéléTravail
          - condition: time
            after: 08:00:00
            before: '19:00:00'
        then:
        - action: input_number.set_value
          metadata: {}
          data:
            value: '{{ states(''input_number.chauffage_consigne_confort_etage'') }}'
          target:
            entity_id:
            - input_number.chauffage_bureau
        else:
        - action: input_number.set_value
          metadata: {}
          data:
            value: '{{ states(''input_number.chauffage_consigne_reduit_chambre_etage'')
              }}'
          target:
            entity_id:
            - input_number.chauffage_bureau
      - action: input_number.set_value
        metadata: {}
        data:
          value: '{{ states(''input_number.chauffage_consigne_reduit_etage'') }}'
        target:
          entity_id:
          - input_number.chauffage_sdb
          - input_number.chauffage_sde
