alias: Surveillance - Automatisations inactives
description: |-
  **Déclencheurs :**
  - Chaque jour à 9h00

  **Fonctionnement :**
  1. Identifie les automatisations non déclenchées depuis 7 jours.
  2. Envoie un SMS récapitulatif avec noms et dates de dernier déclenchement.
triggers:
  - at: "09:00:00"
    trigger: time
actions:
  - variables:
      message: >
        {% set seuil = now() - timedelta(days=7) %} {% set inactives =
        states.automation 
           | selectattr('attributes.last_triggered', 'ne', None)
           | selectattr('attributes.last_triggered', 'lt', seuil) 
           | list %}
        {% if inactives %} Pas déclenchées depuis 7 jours : {% for a in
        inactives %} - {{ a.name }} (last: {{ a.attributes.last_triggered |
        as_timestamp | timestamp_custom('%d/%m %H:%M') }}) {% endfor %} {% else
        %} Toutes les automatisations ont tourné récemment. {% endif %}
  - if:
      - condition: template
        value_template: "{{ message != null }}"
    then:
      - action: script.notification_sms
        data:
          message_type: Automatisations inactives
          message_sms: "{{ message }}"
