id: '1753429767760'
alias: Gestion de la Télécommande HiFi
description: '**Statut :** Finalisé

  **Evolution :** Aucune


  **Déclencheurs :**

  - Changement d''état des capteurs de scène de la télécommande Z-Wave (boutons 1
  à 4)


  **Fonctionnement :**

  1. Bouton 1 appui court (valeur 0) → sélectionne la source BluRay et déclenche la
  HiFi en mode SOURCE.

  2. Bouton 2 appui court → lance les SONOS en mode ON.

  3. Bouton 3 appui court → éteint la HiFi (action OFF).

  4. Bouton 4 appui court → éteint les SONOS (action OFF).

  (Les valeurs 1, 2, 3 de chaque bouton ne sont pas encore affectées.)


  **Entités principales :**

  - `sensor.telecommande_du_salon_nodeid_21_scene_state_scene_00*` : capteurs scène
  Z-Wave

  - `input_select.hifi_action` / `input_select.sonos_action` : coordination AV'
