id: '1776931864007'
alias: Notification de batterie remplacée
description: '**Statut :** Finalisé

  **Evolution :** Aucune


  **Déclencheurs :**

  - Événement `battery_notes_battery_increased` (niveau de batterie en hausse significative)


  **Fonctionnement :**

  1. Crée une notification persistante suggérant de marquer la batterie comme remplacée
  dans Battery Notes.'
triggers:
- trigger: event
  event_type: battery_notes_battery_increased
conditions: []
actions:
- action: persistent_notification.create
  data:
    title: 'Batterie rechargée — {{ trigger.event.data.device_name }}

      '
    message: 'Le niveau de batterie de l''appareil a augmenté, vous souhaitez peut-être
      le marquer comme remplacé

      '
mode: queued
